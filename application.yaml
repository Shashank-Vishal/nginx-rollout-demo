apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-rollout-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Shashank-Vishal/nginx-rollout-demo.git
    targetRevision: HEAD
    path: nginx-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
